<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVD EarlyStop Dashboard</title>
  <script>
    (function () {
      function detectScriptRoot() {
        var pathname = (window.location.pathname || "").replace(/\/+$/, "");
        var proxyMatch = pathname.match(/^(.*\/proxy\/\d+)(?:\/.*)?$/);
        if (proxyMatch && proxyMatch[1]) return proxyMatch[1];
        return {{ script_root | tojson }} || "";
      }
      var scriptRoot = detectScriptRoot();
      window.COT_VIEWER_CONFIG = {
        scriptRoot: scriptRoot,
        plotlyVendorUrl: scriptRoot + "/vendor/plotly.min.js"
      };
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = scriptRoot + "/static/styles.css";
      document.head.appendChild(css);
    })();
    window.__loadPlotlyFallback = function () {
      if (window.Plotly) return;
      var existing = document.querySelector('script[data-plotly-fallback="1"]');
      if (existing) return;
      var s = document.createElement("script");
      s.src = window.COT_VIEWER_CONFIG.plotlyVendorUrl;
      s.dataset.plotlyFallback = "1";
      document.head.appendChild(s);
    };
  </script>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js" onerror="window.__loadPlotlyFallback()"></script>
  <script>
    setTimeout(function () {
      if (!window.Plotly) window.__loadPlotlyFallback();
    }, 1500);
  </script>
</head>
<body>
  <header class="topbar">
    <div class="ctrl">
      <label>Dataset</label>
      <select id="sel-dataset"></select>
    </div>
    <div class="ctrl">
      <label>Problem</label>
      <select id="sel-problem"></select>
    </div>
    <div class="ctrl">
      <label>Method</label>
      <select id="sel-method"></select>
    </div>
    <div class="ctrl">
      <label>Anchor</label>
      <select id="sel-anchor">
        <option value="10">10%</option>
        <option value="40">40%</option>
        <option value="70">70%</option>
        <option value="100" selected>100%</option>
      </select>
    </div>
    <div class="ctrl">
      <label>SVD Domain</label>
      <select id="sel-svd-domain">
        <option value="math">math</option>
        <option value="science">science</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Slice</label>
      <select id="sel-mode">
        <option value="fixed">Fixed</option>
        <option value="smart">Smart</option>
      </select>
    </div>
    <div id="health-pill" class="health-pill">Health: checking…</div>
    <div id="status" class="status">Initializing...</div>
  </header>

  <main id="main-grid">
    <section id="global-alert" class="card card-alert" style="display:none;"></section>

    <!-- CARD 1: SVD Score Trajectory (hero, full-width) -->
    <section class="card card-hero">
      <div class="card-title">SVD Score Trajectory</div>
      <div id="trajectory-subtitle" class="card-subtitle">—</div>
      <div id="plot-trajectory" class="plot plot-hero"></div>
    </section>

    <!-- CARD 2 + CARD 3: Decision | Feature Panel (2-column) -->
    <div class="card-row-2">
      <!-- CARD 2: Decision -->
      <section class="card">
        <div class="card-title">Decision</div>
        <div id="decision-top-runs"></div>
        <div id="why-text" class="why-text">—</div>
        <div id="decision-family-deltas" class="family-delta-list"></div>
        <div id="diag-block" class="diag-box"></div>
      </section>

      <!-- CARD 3: Feature Panel -->
      <section class="card">
        <div class="card-title">Feature Panel</div>
        <div id="plot-features" class="feat-panel"></div>
      </section>
    </div>

    <!-- CARD 4: Group Context (full-width) -->
    <section class="card">
      <div class="card-title">Group Context</div>
      <div id="group-subtitle" class="card-subtitle">—</div>
      <div id="plot-group" class="plot"></div>
    </section>

    <!-- CARD 5: Token Evidence -->
    <section class="card">
      <div class="card-title">
        Token Evidence
        <select id="token-metric-focus" class="inline-select">
          <option value="conf">conf</option>
          <option value="entropy">entropy</option>
          <option value="gini">gini</option>
          <option value="selfcert">self-cert</option>
          <option value="logprob">logprob</option>
        </select>
      </div>
      <div id="plot-token-metric" class="plot"></div>
      <div class="text-panel-row">
        <div>
          <div id="text-left-title" class="sub-title">Top1</div>
          <div id="text-left" class="text-box"></div>
        </div>
        <div>
          <div id="text-right-title" class="sub-title">Top2</div>
          <div id="text-right" class="text-box"></div>
        </div>
      </div>
      <div id="token-detail" class="token-detail">
        <div class="sub-title">Token Detail</div>
        <div id="token-detail-body" class="token-detail-body">Click a text slice to see token-level evidence.</div>
      </div>
    </section>

    <!-- CARD 6: Advanced (collapsed) -->
    <section class="card">
      <details id="advanced-fold">
        <summary class="card-title">Advanced</summary>
        <div id="plot-neuron" class="plot"></div>
      </details>
    </section>
  </main>

  <script>
    (function () {
      var scriptRoot = (window.COT_VIEWER_CONFIG && window.COT_VIEWER_CONFIG.scriptRoot) || "";
      var appScript = document.createElement("script");
      appScript.src = scriptRoot + "/static/app.js";
      document.body.appendChild(appScript);
    })();
  </script>
</body>
</html>
